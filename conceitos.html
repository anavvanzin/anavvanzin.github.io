const F = (c,k) => (lang === 'en' && c.en && c.en[k] != null) ? c.en[k] : c[k];
const tpLabel = (tp) => lang === 'en' ? ({ 'Mobilizado':'Mobilised','Original':'Original','Índice':'Index','Mobilizado · núcleo':'Mobilised · core','Método · qualitativo':'Method · qualitative','Método · quantitativo':'Method · quantitative','Método · síntese':'Method · synthesis' }[tp] || tp) : tp;
const capLabel = (cap) => (lang === 'en' && cap) ? cap.replace('Cap.','Ch.') : cap;
const glyph = (c) => c.core ? `<img src="assets/sun-seal.svg" alt="">` : (G[c.id] || G.glossario);

let selId = null;
try { const s = localStorage.getItem('av_concept'); if (s && byId[s]) selId = s; } catch(e){}
if (!selId) selId = 'iconocracia';

const GROUPS = ['nucleo','metodo','teoria','indice'];

function buildList(filter){
  const f = (filter||'').trim().toLowerCase();
  const host = document.getElementById('list');
  let html = '';
  let any = false;
  GROUPS.forEach(g => {
    const items = CONCEPTS.filter(c => c.cat === g && (!f || F(c,'name').toLowerCase().includes(f)));
    if (!items.length) return;
    any = true;
    html += `<div class="grp"><p class="gh">${T().groups[g]}</p>`;
    items.forEach(c => {
      html += `<button class="item${c.core?' core':''}${c.id===selId?' on':''}" data-id="${c.id}">
        <span class="gi">${glyph(c)}</span><span>${F(c,'name')}</span></button>`;
    });
    html += `</div>`;
  });
  host.innerHTML = any ? html : `<p class="empty">${T().empty}</p>`;
  host.querySelectorAll('.item').forEach(b => b.addEventListener('click', () => select(b.dataset.id, true)));
}

function chip(rel){
  const c = byId[rel];
  if (c) return `<a class="rchip" data-id="${c.id}">${F(c,'name')} <span class="ar">→</span></a>`;
  const label = (lang === 'en' && TOK[rel]) ? TOK[rel] : rel;
  return `<span class="rchip static">${label}</span>`;
}

function renderReader(c){
  const r = document.getElementById('reader');
  document.getElementById('rwm').style.opacity = c.core ? '0.16' : '0.10';
  if (c.glossary){
    const rows = GLOSS.map(g => {
      const nm = (lang==='en' && g.en && g.en.nm) ? g.en.nm : g.nm;
      const src = (lang==='en' && g.en && g.en.src) ? g.en.src : g.src;
      const orig = g.tp === 'Original';
      const tg = orig ? `<span class="tg orig">${lang==='en'?'original':'original'}</span>` : `<span class="tg">${lang==='en'?'mobilised':'mobilizado'}</span>`;
      return `<div class="row"><div><span class="nm2">${nm}</span>${tg}<div class="src">${src}</div></div><div class="cap">${capLabel(g.cap)}</div></div>`;
    }).join('');
    r.innerHTML = `<p class="eyebrow">${T().glossEyebrow}</p><h1 class="wt">${T().glossTitle}</h1><p class="lead">${T().glossLead}</p><div class="gloss">${rows}</div>`;
    return;
  }
  const orig = (F(c,'tipo')||'').toLowerCase().includes('original');
  const meta = `<div class="meta">
      <span class="mchip"><span class="k">${T().kFonte}</span><span class="v">${F(c,'fonte')}</span></span>
      <span class="mchip"><span class="k">${T().kCap}</span><span class="v">${capLabel(c.cap)}</span></span>
      <span class="mchip${orig?' orig':''}"><span class="k">${T().kTipo}</span><span class="v">${tpLabel(F(c,'tipo'))}</span></span>
    </div>`;
  const refn = c.refn ? `<p class="refn">${c.refn}</p>` : '';
  const rels = (c.rel && c.rel.length) ? `<p class="sect">${T().rel}</p><div class="rel">${c.rel.map(chip).join('')}</div>` : '';
  r.innerHTML = `<p class="eyebrow">${T().catName[c.cat]}</p><h1 class="wt">${F(c,'name')}</h1>${meta}<p class="lead">${F(c,'def')}</p>${refn}${rels}`;
  r.querySelectorAll('.rchip[data-id]').forEach(a => a.addEventListener('click', () => select(a.dataset.id, true)));
}

function select(id, scroll){
  if (!byId[id]) return;
  selId = id;
  try { localStorage.setItem('av_concept', id); } catch(e){}
  document.querySelectorAll('.item').forEach(b => b.classList.toggle('on', b.dataset.id === id));
  renderReader(byId[id]);
  if (scroll && window.matchMedia('(max-width:820px)').matches) {
    const rd = document.querySelector('.reader');
    if (rd) window.scrollTo({ top: rd.offsetTop - 50, behavior: 'smooth' });
  }
}

function applyLang(){
  document.documentElement.lang = lang;
  document.getElementById('brand-lbl').textContent = T().lbl;
  document.getElementById('q').placeholder = T().ph;
  document.querySelectorAll('#langtog button').forEach(b => b.setAttribute('aria-pressed', b.dataset.lang === lang ? 'true':'false'));
  document.querySelectorAll('.avnav a[data-pt]').forEach(a => a.textContent = a.getAttribute('data-'+lang));
  buildList(document.getElementById('q').value);
  renderReader(byId[selId]);
}

document.getElementById('q').addEventListener('input', (e) => buildList(e.target.value));
document.querySelectorAll('#langtog button').forEach(b => b.addEventListener('click', () => {
  if (b.dataset.lang === lang) return;
  lang = b.dataset.lang;
  try { localStorage.setItem('av_lang', lang); } catch(e){}
  applyLang();
}));

applyLang();
select(selId, false);
</script>
</body>
</html>
