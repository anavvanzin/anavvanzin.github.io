  .field{position:absolute;inset:42px 0 0 0;overflow:hidden}

  .stripe{flex:1;height:9px;background:repeating-linear-gradient(to bottom,var(--ink) 0 1px,transparent 1px 3px);opacity:.9}
  .bar .t{font-family:var(--font-display);font-weight:600;font-size:14px;white-space:nowrap}
  .cardbody{display:flex}
  .plate{background:var(--ink);padding:16px;border-right:1px solid var(--ink);display:flex;align-items:center;flex:none}

  .meat{flex:1;padding:24px 28px}
  .eyebrow{font-family:var(--font-display);font-weight:600;text-transform:uppercase;letter-spacing:.2em;font-size:11px;color:var(--rubric);margin:0 0 10px}
  .nm{font-family:var(--font-display);font-weight:600;line-height:1.02;margin:0;font-size:42px;color:var(--ink)}
  .intro{font-size:14.5px;line-height:1.55;color:var(--text-muted);margin:12px 0 4px;max-width:42ch}
  #lines{margin-top:14px;border-top:1px solid var(--rule-hairline);padding-top:4px}
  .rl{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:14.5px;line-height:1.45;color:var(--text-body)}
  .rl .b{color:var(--rubric);font-weight:600;line-height:1.45}
  .more{display:inline-block;margin-top:14px;font-family:var(--font-display);font-weight:600;font-size:13.5px;color:var(--rubric);text-decoration:none}
  .more:hover{text-decoration:underline}

  /* dock */
  .dock{position:absolute;left:50%;transform:translateX(-50%);bottom:30px;display:flex;gap:16px;align-items:flex-end;background:var(--paper);border:1px solid var(--ink);box-shadow:5px 5px 0 0 var(--ink);padding:13px 20px;z-index:40}
  .di{display:flex;flex-direction:column;align-items:center;gap:7px;text-decoration:none}
  .ico{position:relative;width:44px;height:44px;border:1.5px solid var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--ink);background:var(--paper);transition:transform .12s ease,background .12s ease,color .12s ease}
  .ico.ig{border-radius:10px}
  .ico.ig i{position:absolute;width:15px;height:15px;border:1.6px solid currentColor;border-radius:50%}
  .ico.ig em{position:absolute;top:7px;right:7px;width:3.4px;height:3.4px;background:currentColor;border-radius:50%}
  .di .lb{font-size:11.5px;color:var(--text-faint);font-family:var(--font-body);white-space:nowrap}
  .di:hover .ico{background:var(--ink);color:var(--paper);transform:translateY(-4px)}
  .di:hover .lb{color:var(--ink)}
  .dsep{width:1px;align-self:stretch;background:var(--rule-hairline);margin:2px 4px}

  @media(max-width:820px){
    body{overflow:auto}
    .field{position:static;padding:22px 16px 30px;overflow:visible}
    .card{position:static;left:auto;top:auto;width:auto;max-width:560px;margin:18px auto 26px}
    .cardbody{flex-direction:column}
    .plate{border-right:0;border-bottom:1px solid var(--ink);justify-content:center}
    .plate img{height:200px}
    .dock{position:static;transform:none;margin:0 auto;width:max-content;max-width:100%;flex-wrap:wrap;justify-content:center}
    .menu .hint{display:none}
  }
</style>

<script>
let lang = 'pt';
try { const s = localStorage.getItem('av_lang'); if (s === 'pt' || s === 'en') lang = s; } catch(e){}

const T = {
  pt:{
    hint:'arraste o cartão', cardtitle:'perfil', eyebrow:'Iconocracia', mail:'E-mail',
    intro:'Advogada e historiadora do direito. Doutoranda e mestra em Direito (PPGD/UFSC), na linha Direito dos Grupos Vulneráveis.',
    lines:['Alegorias femininas do direito','Feminilidade de Estado — a nação como mulher','Condição jurídica da mulher — nacionalidade e cidadania'],
    more:'Ver o currículo acadêmico →'
  },
  en:{
    hint:'drag the card', cardtitle:'profile', eyebrow:'Iconocracy', mail:'Email',
    intro:'Lawyer and legal historian. PhD candidate and Master in Law (PPGD/UFSC), Vulnerable Groups research line.',
    lines:['Female allegories of law','State Femininity — the nation as a woman','Women’s legal condition — nationality and citizenship'],
    more:'See the academic CV →'
  }
};

function render(){
  const d = T[lang];
  document.documentElement.lang = lang;
  document.getElementById('hint').textContent = d.hint;
  document.getElementById('cardtitle').textContent = d.cardtitle;
  document.getElementById('eyebrow').textContent = d.eyebrow;
  document.getElementById('intro').textContent = d.intro;
  document.getElementById('more').textContent = d.more;
  document.getElementById('lb-mail').textContent = d.mail;
  document.getElementById('lines').innerHTML = d.lines.map(t => `<div class="rl"><span class="b">·</span><span>${t}</span></div>`).join('');
  document.querySelectorAll('#langtog button').forEach(b => b.setAttribute('aria-pressed', b.dataset.lang === lang ? 'true':'false'));
}
document.querySelectorAll('#langtog button').forEach(b => b.addEventListener('click', () => {
  if (b.dataset.lang === lang) return;
  lang = b.dataset.lang;
  try { localStorage.setItem('av_lang', lang); } catch(e){}
  render();
}));
render();

/* drag the hero card (desktop only) */
const field = document.getElementById('field');
const card = document.getElementById('card');
const bar = document.getElementById('bar');
let d = null;
bar.addEventListener('pointerdown', (e) => {
  if (window.matchMedia('(max-width:820px)').matches) return;
  const fr = field.getBoundingClientRect();
  const r = card.getBoundingClientRect();
  d = { dx: e.clientX - r.left, dy: e.clientY - r.top, fr };
  bar.setPointerCapture(e.pointerId);
  bar.style.cursor = 'grabbing';
});
bar.addEventListener('pointermove', (e) => {
  if (!d) return; const { fr } = d;
  let nx = Math.max(0, Math.min(e.clientX - fr.left - d.dx, fr.width - 90));
  let ny = Math.max(0, Math.min(e.clientY - fr.top - d.dy, fr.height - 40));
  card.style.left = nx + 'px'; card.style.top = ny + 'px';
});
bar.addEventListener('pointerup', () => { d = null; bar.style.cursor = 'grab'; });
</script>
<script>
(function(){
  var path=(location.pathname.split('/').pop()||'index.html');
  function lang(){try{return localStorage.getItem('av_lang')==='en'?'en':'pt';}catch(e){return 'pt';}}
  function paint(){var l=lang();document.querySelectorAll('#avnav [data-pt],#vista [data-pt]').forEach(function(el){el.textContent=el.getAttribute('data-'+l);});}
  document.querySelectorAll('#avnav a[data-page]').forEach(function(a){if(a.getAttribute('data-page').split('|').indexOf(path)>=0)a.classList.add('cur');});
  paint();
  document.addEventListener('click',function(e){var b=e.target.closest('.langtog button, #langtog button');if(b)setTimeout(paint,40);});
  setInterval(paint,800);
})();
</script>
