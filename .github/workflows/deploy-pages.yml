# Resume GitHub Pages publishes for anavanzin.com.
# Repo Settings → Pages uses build_type=workflow, but no workflow existed after
# mid-2026 — deploys stopped at commit 3058230 (2026-07-11) while main moved on.
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage site tree (tracked files, drop oversize media)
        run: |
          set -euo pipefail
          mkdir -p _site
          git archive HEAD | tar -x -C _site
          rm -f \
            "_site/assets/wallpaper-engine-ukiyo-e-flowing-topography-1779795277375 (1).mp4" \
            _site/assets/tropical_iconocracy_conference.mp4 \
            _site/assets/tropical_iconocracy_conference_v2.mp4 \
            _site/assets/tropical_iconocracy_vertical_v2.mp4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
