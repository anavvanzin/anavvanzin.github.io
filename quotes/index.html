<!--
  Quotes Site v3 — Editorial Gallery Experience
  ProBoards forum "Trechos" archive, 1,608 quotes.
  Mix B+C: minimal gallery layout + editorial catalog details.
-->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    /* entrada escalonada só quando seguro: IntersectionObserver presente e sem
       reduced-motion. Sem essa classe, os cards nascem visíveis (no-JS / browser
       antigo / reduced-motion nunca deixam o conteúdo invisível). */
    try {
      if ('IntersectionObserver' in window &&
          !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.documentElement.classList.add('stagger-on');
      }
    } catch (e) {}
  </script>
  <title>Trechos | anavanzin</title>
  <meta name="description" content="Coleção de 1.608 trechos literários reunidos entre 2014 e 2026.">
  <link rel="icon" type="image/png" href="/assets/avatar-pixel.png">
  <link rel="apple-touch-icon" href="/assets/avatar-pixel.png">
  <link rel="stylesheet" href="../fonts/fonts.css"><!-- self-hosted woff2: Crimson Pro + Cormorant + Hanken (no CDN) -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <a class="back-mesa" href="/" title="ana vanzin" aria-label="ana vanzin" style="color:var(--text-muted);text-decoration:none;font-family:var(--font-ui);font-size:.85rem;margin-right:.6rem;white-space:nowrap">←</a>
      <span class="brand-mark">❝</span>
      <h1>Trechos</h1>
      <span class="brand-count" id="quoteCount"></span>
    </div>
    <nav class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por palavra, autor..." autocomplete="off" aria-label="Buscar trechos por palavra ou autor">
        <kbd>Ctrl+K</kbd>
      </div>
      <button id="randomBtn" title="Sortear um trecho" aria-label="Sortear um trecho"><svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="1.3" aria-hidden="true"><rect x="3.5" y="3.5" width="17" height="17" rx="3.5"/><circle cx="8.5" cy="8.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="15.5" cy="8.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="1.15" fill="currentColor" stroke="none"/><circle cx="8.5" cy="15.5" r="1.15" fill="currentColor" stroke="none"/><circle cx="15.5" cy="15.5" r="1.15" fill="currentColor" stroke="none"/></svg></button>
      <button id="themeBtn" title="Alternar modo claro/escuro" aria-label="Alternar modo claro/escuro">◐</button>
    </nav>
  </header>

  <main class="quotes-grid" id="quotesGrid"></main>

  <div class="load-more" id="loadMore">
    <button id="loadMoreBtn">Carregar mais</button>
    <span id="progressText"></span>
  </div>

  <footer class="site-footer">
    anavanzin · 2014–2026
  </footer>

  <div class="overlay" id="overlay">
    <div class="overlay-bg"></div>
    <div class="overlay-card" id="overlayCard">
      <button class="close-overlay" id="closeOverlay">&times;</button>
      <div class="overlay-quote" id="overlayQuote"></div>
      <div class="overlay-meta" id="overlayMeta"></div>
      <div class="overlay-actions">
        <button id="copyBtn">Copiar</button>
        <button id="prevRandom">← Anterior</button>
        <button id="nextRandom">Próximo →</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
