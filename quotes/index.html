<!--
  Protótipo: Quotes Site v2
  Lê forum-data.json e apresenta as citações de forma elegante.
  Para rodar localmente:
    python3 -m http.server 8765 --directory .
    # abra http://localhost:8765
-->
<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trechos | anavanzin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <span class="brand-mark">❝</span>
      <h1>Trechos</h1>
      <span class="brand-count" id="quoteCount"></span>
    </div>
    <nav class="toolbar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Buscar por palavra, autor, trecho..." autocomplete="off">
        <kbd>Ctrl+K</kbd>
      </div>
      <button id="randomBtn" title="Sortear um trecho">🎲</button>
      <button id="themeBtn" title="Alternar modo claro/escuro">◐</button>
    </nav>
  </header>

  <main class="quotes-grid" id="quotesGrid"></main>

  <div class="load-more" id="loadMore">
    <button id="loadMoreBtn">Carregar mais</button>
    <span id="progressText"></span>
  </div>

  <div class="overlay" id="overlay">
    <div class="overlay-card" id="overlayCard">
      <button class="close-overlay" id="closeOverlay">&times;</button>
      <div class="overlay-quote" id="overlayQuote"></div>
      <div class="overlay-meta" id="overlayMeta"></div>
      <div class="overlay-actions">
        <button id="copyBtn">📋 Copiar</button>
        <button id="prevRandom">← Anterior</button>
        <button id="nextRandom">Próximo →</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
