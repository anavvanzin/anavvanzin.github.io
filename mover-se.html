<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mover-se · ana vanzin</title>
  <link rel="icon" href="/assets/avatar-pixel.png">
  <meta name="description" content="Navegue pelas seções do site através de paradigmas visuais.">
  <meta name="theme-color" content="#F5F0E6">
  
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/editorial.css">
  
  <style>
    :root {
      --anim-spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
      --anim-ease: cubic-bezier(0.22, 1, 0.36, 1);
    }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Topbar */
    .ms-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--ink);
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .ms-topbar-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .ms-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1.1rem;
      letter-spacing: 0.02em;
    }
    .ms-switcher {
      display: flex;
      gap: 8px;
    }
    .ms-btn {
      background: none;
      border: 1px solid var(--ink);
      color: var(--ink);
      font-family: var(--font-display);
      font-size: 0.85rem;
      padding: 6px 12px;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .ms-btn:hover {
      background: var(--ink-10);
    }
    .ms-btn.active {
      background: var(--ink);
      color: var(--paper);
    }
    .ms-btn:focus-visible {
      outline: 2px solid var(--rubric);
      outline-offset: 2px;
    }
    
    /* Container for Paradigms */
    .ms-container {
      flex: 1;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* 1. Fio Rubrico */
    #p-fio {
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px;
      position: relative;
    }
    .fio-line {
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 2px;
      background: var(--rubric);
      transform-origin: top;
      animation: threadGrow 1s var(--anim-ease) forwards;
    }
    @keyframes threadGrow {
      from { transform: scaleY(0); }
      to { transform: scaleY(1); }
    }
    .fio-knot-container {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 60px;
      opacity: 0;
      transform: scale(0.5);
      animation: popIn 0.6s var(--anim-spring) forwards;
    }
    @keyframes popIn {
      to { opacity: 1; transform: scale(1); }
    }
    .fio-knot {
      width: 16px;
      height: 16px;
      background: var(--paper);
      border: 2px solid var(--rubric);
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.2s;
    }
    .fio-knot:hover, .fio-knot:focus-visible {
      background: var(--rubric);
      transform: scale(1.3);
    }
    .fio-content {
      margin-top: 16px;
      text-align: center;
      display: none;
      background: var(--paper);
      padding: 12px 24px;
      border: 1px solid var(--rubric);
    }
    .fio-knot-container.open .fio-content {
      display: block;
      animation: rise 0.4s var(--anim-ease) forwards;
    }
    
    /* 2. Margem Viva */
    #p-margem {
      display: none;
      flex: 1;
      flex-direction: row;
    }
    .mv-sidebar {
      width: 208px;
      border-right: 1.5px solid var(--ink);
      padding: 40px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .mv-content {
      flex: 1;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .mv-link {
      font-family: var(--font-display);
      font-size: 1.2rem;
      color: var(--ink);
      text-decoration: none;
      border-bottom: 1.5px solid transparent;
      transition: all 0.2s;
      opacity: 0;
      transform: translateX(-14px);
      animation: slideL 0.5s var(--anim-ease) forwards;
    }
    .mv-link:hover, .mv-link:focus-visible, .mv-link.active {
      color: var(--rubric);
    }
    @keyframes slideL {
      to { opacity: 1; transform: translateX(0); }
    }
    .mv-detail {
      display: none;
      animation: rise 0.5s var(--anim-ease) forwards;
    }
    .mv-detail.active {
      display: block;
    }

    /* 3. A Venda */
    #p-venda {
      display: none;
      flex-direction: column;
      padding: 40px;
      gap: 20px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
    .v-item {
      position: relative;
      border: 1px solid var(--ink);
      padding: 30px;
      background: var(--paper);
      overflow: hidden;
      opacity: 0;
      transform: translateY(16px);
      animation: rise 0.6s var(--anim-ease) forwards;
    }
    .v-overlay {
      position: absolute;
      inset: 0;
      background: var(--ink);
      border-left: 4px solid var(--rubric);
      color: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-family: var(--font-display);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      transition: transform 0.6s var(--anim-ease);
      z-index: 10;
    }
    .v-overlay:hover {
      background: #222;
    }
    .v-item.revealed .v-overlay {
      transform: translateY(-101%);
    }

    /* 4. Fichário */
    #p-fichario {
      display: none;
      flex-direction: column;
      padding: 40px;
      max-width: 1000px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
    }
    .f-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .f-chip {
      background: none;
      border: 1px solid var(--ink);
      border-radius: 16px;
      padding: 6px 16px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    .f-chip.active {
      background: var(--ink);
      color: var(--paper);
    }
    .f-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 24px;
    }
    .f-card {
      border: 1px solid var(--ink);
      padding: 24px;
      background: var(--paper);
      text-decoration: none;
      color: var(--ink);
      transition: transform 0.2s, box-shadow 0.2s;
      opacity: 0;
      transform: translateY(14px) scale(0.94);
      animation: cardIn 0.5s var(--anim-ease) forwards;
    }
    .f-card:hover, .f-card:focus-visible {
      transform: translateY(-4px);
      box-shadow: 4px 4px 0 var(--ink-50);
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .f-cota {
      font-family: monospace;
      font-size: 11px;
      color: var(--rubric);
      margin-bottom: 12px;
      display: block;
    }

    /* Common typography for sections */
    .sec-roman {
      font-family: var(--font-display);
      font-style: italic;
      color: var(--rubric);
      font-size: 1.2rem;
      margin-bottom: 8px;
    }
    .sec-title {
      font-family: var(--font-display);
      font-weight: 600;
      font-size: clamp(1.6rem, 3.6vw, 2.3rem);
      margin: 0 0 8px 0;
      text-decoration: none;
      color: var(--ink);
      display: inline-block;
    }
    .sec-title:hover {
      text-decoration: underline;
    }
    .sec-gloss {
      font-size: 0.9rem;
      opacity: 0.7;
      margin: 0;
    }

    @keyframes rise {
      from { transform: translateY(16px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* Mobile Margem Viva */
    @media (max-width: 768px) {
      #p-margem {
        flex-direction: column;
      }
      .mv-sidebar {
        width: auto;
        border-right: none;
        border-bottom: 1.5px solid var(--ink);
        padding: 20px;
        flex-direction: row;
        overflow-x: auto;
      }
      .mv-content {
        padding: 30px 20px;
      }
      .ms-topbar {
        flex-direction: column;
        gap: 16px;
      }
      .ms-switcher {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
    
    @media (prefers-reduced-motion: reduce) {
      *, ::before, ::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>

  <div class="ms-topbar">
    <div class="ms-topbar-left">
      <a href="/" class="ms-title" style="text-decoration: none; color: var(--ink);">ana vanzin</a>
      <span style="opacity: 0.5;">/</span>
      <span class="ms-title">Mover-se</span>
    </div>
    <div class="ms-switcher">
      <button class="ms-btn active" data-target="fio">Fio Rubrico</button>
      <button class="ms-btn" data-target="margem">Margem Viva</button>
      <button class="ms-btn" data-target="venda">A Venda</button>
      <button class="ms-btn" data-target="fichario">Fichário</button>
    </div>
  </div>

  <div class="ms-container">
    
    <!-- 1. Fio Rubrico -->
    <div id="p-fio" class="paradigm-view">
      <div class="fio-line"></div>
      <div id="fio-knots"></div>
    </div>

    <!-- 2. Margem Viva -->
    <div id="p-margem" class="paradigm-view">
      <div class="mv-sidebar" id="mv-links"></div>
      <div class="mv-content" id="mv-contents"></div>
    </div>

    <!-- 3. A Venda -->
    <div id="p-venda" class="paradigm-view">
      <button id="v-replay" class="ms-btn" style="align-self: flex-end; margin-bottom: 20px;">Replay</button>
      <div id="v-items"></div>
    </div>

    <!-- 4. Fichário -->
    <div id="p-fichario" class="paradigm-view">
      <div class="f-filters">
        <button class="f-chip active" data-filter="all">todos</button>
        <button class="f-chip" data-filter="tese">tese</button>
        <button class="f-chip" data-filter="texto">texto</button>
        <button class="f-chip" data-filter="nota">nota</button>
        <button class="f-chip" data-filter="prática">prática</button>
        <button class="f-chip" data-filter="contato">contato</button>
      </div>
      <div class="f-grid" id="f-grid"></div>
    </div>

  </div>

  <script>
    const data = [
      { num: 'i', roman: 'i', title: 'tese', gloss: 'Iconocracia — as imagens do direito', type: 'tese', folio: '01', url: '/iconocracia/' },
      { num: '1', roman: 'ii', title: 'publicações', gloss: 'artigos, capítulos e ensaios', type: 'texto', folio: '14', url: '/publicacoes/' },
      { num: '2', roman: 'iii', title: 'ius gentium', gloss: 'notas de direito internacional', type: 'nota', folio: '28', url: '/grupoiusgentium/' },
      { num: '3', roman: 'iv', title: 'advocacia', gloss: 'atuação e áreas', type: 'prática', folio: '41', url: '/advocacia.html' },
      { num: '4', roman: 'v', title: 'contato', gloss: 'ana@anavanzin.com', type: 'contato', folio: '52', url: 'mailto:ana@anavanzin.com' },
    ];

    function renderFio() {
      const container = document.getElementById('fio-knots');
      container.innerHTML = data.map((item, i) => \`
        <div class="fio-knot-container" style="animation-delay: \${0.3 + i*0.15}s">
          <button class="fio-knot" aria-label="\${item.title}" onclick="this.parentElement.classList.toggle('open')"></button>
          <div class="fio-content">
            <div class="sec-roman">\${item.roman}</div>
            <a href="\${item.url}" class="sec-title">\${item.title}</a>
            <p class="sec-gloss">\${item.gloss}</p>
          </div>
        </div>
      \`).join('');
    }

    function renderMargem() {
      const links = document.getElementById('mv-links');
      const contents = document.getElementById('mv-contents');
      
      links.innerHTML = data.map((item, i) => \`
        <button class="mv-link \${i===0?'active':''}" style="animation-delay: \${i*0.1}s; background:none; border:none; text-align:left; cursor:pointer;" onclick="switchMargem(\${i})">\${item.title}</button>
      \`).join('');
      
      contents.innerHTML = data.map((item, i) => \`
        <div class="mv-detail \${i===0?'active':''}" id="mv-det-\${i}">
          <div class="sec-roman">\${item.roman}</div>
          <a href="\${item.url}" class="sec-title">\${item.title}</a>
          <p class="sec-gloss">\${item.gloss}</p>
        </div>
      \`).join('');
    }

    window.switchMargem = (idx) => {
      document.querySelectorAll('.mv-link').forEach((el, i) => el.classList.toggle('active', i === idx));
      document.querySelectorAll('.mv-detail').forEach((el, i) => el.classList.toggle('active', i === idx));
    };

    function renderVenda() {
      const container = document.getElementById('v-items');
      container.innerHTML = data.map((item, i) => \`
        <div class="v-item" style="animation-delay: \${i*0.1}s">
          <div class="v-overlay" onclick="this.parentElement.classList.add('revealed')" role="button" tabindex="0" onkeydown="if(event.key==='Enter')this.click()">vendado — toque para revelar</div>
          <div class="sec-roman">\${item.roman}</div>
          <a href="\${item.url}" class="sec-title">\${item.title}</a>
          <p class="sec-gloss">\${item.gloss}</p>
        </div>
      \`).join('');
    }

    document.getElementById('v-replay').addEventListener('click', () => {
      document.querySelectorAll('.v-item').forEach(el => el.classList.remove('revealed'));
    });

    function renderFichario() {
      const container = document.getElementById('f-grid');
      container.innerHTML = data.map((item, i) => \`
        <a href="\${item.url}" class="f-card f-card-item" data-type="\${item.type}" style="animation-delay: \${i*0.1}s">
          <span class="f-cota">AV·\${item.folio}</span>
          <div class="sec-roman">\${item.roman}</div>
          <div class="sec-title" style="font-size: 1.4rem;">\${item.title}</div>
          <p class="sec-gloss">\${item.gloss}</p>
        </a>
      \`).join('');
    }

    document.querySelectorAll('.f-chip').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('.f-chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        const filter = e.target.getAttribute('data-filter');
        
        document.querySelectorAll('.f-card-item').forEach(card => {
          if (filter === 'all' || card.getAttribute('data-type') === filter) {
            card.style.display = 'block';
            // Re-trigger animation
            card.style.animation = 'none';
            card.offsetHeight; /* trigger reflow */
            card.style.animation = null; 
          } else {
            card.style.display = 'none';
          }
        });
      });
    });

    // Init paradigms
    renderFio();
    renderMargem();
    renderVenda();
    renderFichario();

    // Switcher Logic
    const switcherBtns = document.querySelectorAll('.ms-switcher .ms-btn');
    const paradigms = document.querySelectorAll('.paradigm-view');
    
    function setParadigm(id) {
      localStorage.setItem('av_moverse_mode', id);
      switcherBtns.forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-target') === id));
      paradigms.forEach(p => p.style.display = p.id === 'p-' + id ? 'flex' : 'none');
    }

    switcherBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        setParadigm(btn.getAttribute('data-target'));
      });
    });

    // Restore state
    const saved = localStorage.getItem('av_moverse_mode') || 'fio';
    setParadigm(saved);

  </script>
</body>
</html>
