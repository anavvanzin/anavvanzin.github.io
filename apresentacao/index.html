<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Apresentação · ana vanzin</title>
<meta name="description" content="Apresentação da Iconocracia — em integração.">
<link rel="icon" type="image/png" href="/assets/avatar-pixel.png">
<link rel="stylesheet" href="/fonts/fonts.css">
<style>
  :root{--paper:#EFE5CF;--ink:#211B16;--rubric:#9B2C1C;--gold:#B08D3C;--disp:'Cormorant Garamond',serif;--body:'Hanken Grotesk',sans-serif;--mono:'JetBrains Mono',monospace}
  html,body{margin:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--body);min-height:100vh;background-image:radial-gradient(rgba(33,27,22,.04) .5px,transparent .5px);background-size:4px 4px;display:flex;flex-direction:column}
  .bar{display:flex;align-items:center;gap:10px;border-bottom:1.5px solid var(--ink);padding:8px clamp(14px,3vw,28px);font-family:var(--mono);font-size:12px}
  .bar a{color:var(--ink);text-decoration:none}.bar a:hover{color:var(--rubric)}
  .wrap{flex:1;max-width:760px;margin:0 auto;padding:clamp(48px,10vh,110px) 24px;text-align:center}
  .kick{font-family:var(--mono);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--rubric);margin:0}
  h1{font-family:var(--disp);font-weight:600;font-size:clamp(40px,8vw,72px);margin:8px 0 0;line-height:1}
  p{font-size:17px;line-height:1.6;color:color-mix(in srgb,var(--ink) 80%,var(--paper));max-width:52ch;margin:22px auto 0}
  .flr{color:var(--gold);font-family:var(--disp);font-size:26px;margin-top:28px}
</style>
</head>
<body>
  <nav class="bar"><a href="/landing/">← <span data-pt="voltar à mesa" data-en="back to the desk">voltar à mesa</span></a></nav>
  <main class="wrap">
    <p class="kick">Iconocracia</p>
    <h1 data-pt="Apresentação" data-en="Presentation">Apresentação</h1>
    <p data-pt="O deck de apresentação está sendo integrado a partir do documento original. Em breve aqui."
       data-en="The presentation deck is being integrated from the source document. Coming soon.">O deck de apresentação está sendo integrado a partir do documento original. Em breve aqui.</p>
    <div class="flr">❧</div>
  </main>
  <script src="/editorial.js"></script>
</body>
</html>
