<!doctype html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ana vanzin · sala de pôsteres</title>
<link rel="icon" type="image/png" href="/assets/avatar-pixel.png">
<link rel="stylesheet" href="/styles.css">
<script src="/vendor/react/react-18.3.1.production.min.js"></script>
<script src="/vendor/react/react-dom-18.3.1.production.min.js"></script>
<script src="/_ds_bundle.js"></script>
<script src="/WPoster.js"></script>
<style>
  html, body { margin: 0; min-height: 100%; background: var(--paper); }
  body { font-family: var(--font-body); color: var(--ink); }
</style>
</head>
<body>
<div id="root"></div>
<script>
  (function(){
    const urlParams = new URLSearchParams(window.location.search);
    const lang = urlParams.get('lang') || 'pt';
    document.documentElement.lang = lang;
    
    const WPoster = window.avapp.WPoster;
    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(WPoster, { lang: lang, standalone: true })
    );
  })();
</script>
</body>
</html>
